<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS Manager Dashboard</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 400px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        .status { display: inline-block; padding: 0.5rem 1rem; background: #10b981; color: white; border-radius: 2rem; font-size: 0.875rem; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VPS Manager</h1>
        <p>Your secure hosting environment is connected.</p>
        <div class="status">* System Active</div>
        <div style="margin-top: 2rem; font-size: 0.75rem; color: #64748b;">Host: 72.61.232.114</div>
    </div>
</body>
</html>
