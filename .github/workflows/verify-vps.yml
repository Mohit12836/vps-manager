name: Verify VPS Connection
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Test Connection
      run: |
        echo "Testing connection to ${{ secrets.VPS_IP }} as ${{ secrets.VPS_USER }}"
        if [ -z "${{ secrets.VPS_IP }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_PASSWORD }}" ]; then
          echo "Error: One or more secrets are missing!"
          exit 1
        fi
        echo "VPS Secrets are securely loaded."
